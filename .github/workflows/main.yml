name: Run Wave Scraper
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # Upgraded version
      - name: Install dependencies
        run: pip install requests gspread google-auth pytz
      - name: Execute Script
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python wave_scraper.py
